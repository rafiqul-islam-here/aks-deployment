apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: rafiqhere/app-service-apps:frontend
        imagePullPolicy: Always
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  annotations:

    # 🔐 IP Restriction (choose ONE approach)
    # nginx.ingress.kubernetes.io/whitelist-source-range: "103.25.44.0/24,192.168.0.1/30"
    # nginx.ingress.kubernetes.io/denylist-source-range: "103.25.44.0/24,45.67.89.10/32"

    # 🚦 Rate Limiting (DDoS protection basic layer)
    nginx.ingress.kubernetes.io/limit-rps: "30"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"

    # 🔌 Connection limit per IP
    nginx.ingress.kubernetes.io/limit-connections: "20"

    # 📦 Prevent large payload attacks
    nginx.ingress.kubernetes.io/proxy-body-size: "5m"

    # ⏱ Optional bandwidth control (rarely used)
    nginx.ingress.kubernetes.io/limit-rate-after: "10"

    # 🔒 HTTPS behavior (only works if TLS enabled)
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

spec:
  ingressClassName: nginx

  tls:
  - hosts:
    - staticapp.test
    secretName: staticapp-tls

  rules:
  - host: staticapp.test
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
